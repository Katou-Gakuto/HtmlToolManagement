<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon File Organizer</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="game-header">
        <div class="header-title">📂 Dungeon File Organizer</div>
    </header>

    <main class="main-layout">
        <nav class="dock-bar" id="dock-scroller">
            <button class="dock-btn active" data-target="win-file-view">📄</button>
            <button class="dock-btn active" data-target="win-preview-view">🚪</button>
            <button class="dock-btn" data-target="win-log-view">📜</button>
        </nav>
        
        <div class="workspace" id="main-workspace">
            <div class="side-panel" id="left-side-panel">

                <div class="resizer-x"></div>

                <div class="windows-stack" id="windows-container">
                    <div id="win-file-view" class="resizable-window" draggable="true">
                        <div class="window-header"><span class="drag-handle">☰ 📄 仕分け操作</span><button class="win-close-btn" data-target="win-file-view">×</button></div>
                        <div class="window-body"><div id="panel-file-title">ファイルに近づいてください</div><div id="folder-buttons-container"></div></div>
                        <div class="resizer-y"></div>
                    </div>
                    <div id="win-preview-view" class="resizable-window" draggable="true">
                        <div class="window-header"><span class="drag-handle">☰ 🚪 予定</span><button class="win-close-btn" data-target="win-preview-view">×</button></div>
                        <div class="window-body"><div id="preview-list-container"></div></div>
                        <div class="resizer-y"></div>
                    </div>
                    <div id="win-log-view" class="resizable-window" draggable="true">
                        <div class="window-header"><span class="drag-handle">☰ 📜 ログ</span><button class="win-close-btn" data-target="win-log-view">×</button></div>
                        <div class="window-body"><div id="log-list"></div></div>
                        <div class="resizer-y"></div>
                    </div>
                </div>
            </div>
            <section class="canvas-container"><canvas id="game-canvas" width="700" height="550"></canvas></section>
        </div>
    </main>
    <script src="js/mockSystem.js"></script>
    <script src="js/CommonProcessing.js"></script>
    <script src="js/transaction.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
