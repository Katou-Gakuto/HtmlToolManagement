<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spatial File Organizer</title>
    <style>
        /* --- 全体設計 --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: #1a202c; 
            color: #e2e8f0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* --- ヘッダー --- */
        .game-header { 
            background-color: #2d3748; 
            padding: 10px 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            border-bottom: 2px solid #4a5568; 
            height: 60px; 
        }
        .header-title { font-size: 1.2rem; font-weight: bold; color: #63b3ed; }
        .header-badges { display: flex; gap: 15px; }
        .badge { background-color: #4a5568; padding: 6px 12px; border-radius: 20px; font-size: 0.9rem; font-weight: bold; }
        .badge-pending { background-color: #2b6cb0; color: #ebf8ff; }

        /* --- メインレイアウト --- */
        .main-layout { 
            display: flex; 
            flex: 1; 
            height: calc(100vh - 60px); 
            overflow: hidden; 
        }

        /* 左端ドックバー */
        .dock-bar { 
            width: 50px; 
            background-color: #1a202c; 
            border-right: 2px solid #4a5568; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding-top: 10px; 
            gap: 12px; 
            overflow-y: auto; 
            scrollbar-width: none; 
            -ms-overflow-style: none; 
        }
        .dock-bar::-webkit-scrollbar { display: none; }
        .dock-btn { 
            width: 38px; 
            height: 38px; 
            background-color: #2d3748; 
            border: 1px solid #4a5568; 
            border-radius: 8px; 
            color: #e2e8f0; 
            font-size: 1.2rem; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.2s ease; 
            border-left: 3px solid transparent; 
        }
        .dock-btn:hover { background-color: #4a5568; border-color: #63b3ed; }
        .dock-btn.active { 
            background-color: #2b6cb0; 
            border-color: #63b3ed; 
            box-shadow: 0 0 10px rgba(99, 179, 237, 0.4); 
            border-left: 3px solid #63b3ed; 
        }

        /* ワークスペース */
        .workspace { flex: 1; display: flex; height: 100%; overflow: hidden; background-color: #111622; }

        /* サイドパネル (縦積みウィンドウ) */
        .side-panel { 
            position: relative; 
            width: 350px; 
            min-width: 200px; 
            max-width: 600px; 
            height: 100%; 
            background-color: #2d3748; 
            border-right: 2px solid #1a202c; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
        }
        .windows-stack { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            padding: 5px; 
            gap: 6px; 
        }
        .resizable-window { 
            position: relative; 
            width: 100%; 
            height: 250px; 
            min-height: 80px; 
            background-color: #2d3748; 
            border: 1px solid #4a5568; 
            border-radius: 6px; 
            display: flex; 
            flex-direction: column; 
            flex-shrink: 0; 
            transition: transform 0.1s ease; 
        }
        .resizable-window.dragging { opacity: 0.4; border: 2px dashed #63b3ed; }
        .resizable-window.hidden-window { display: none !important; }
        
        .window-header { 
            background-color: #1a202c; 
            padding: 6px 12px; 
            font-size: 0.8rem; 
            font-weight: bold; 
            color: #a0aec0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            user-select: none; 
            -webkit-user-select: none; 
            border-bottom: 1px solid #4a5568; 
        }
        .drag-handle { cursor: grab; flex: 1; }
        .drag-handle:active { cursor: grabbing; }
        .win-close-btn { 
            background: none; 
            border: none; 
            color: #a0aec0; 
            font-size: 1.1rem; 
            cursor: pointer; 
            line-height: 1; 
            padding: 0 4px; 
            transition: color 0.1s; 
        }
        .win-close-btn:hover { color: #e53e3e; }
        .window-body { flex: 1; padding: 12px; overflow-y: auto; }
        .window-body h3 { font-size: 0.9rem; margin-bottom: 8px; color: #e2e8f0; }
        
        /* リサイズつまみ */
        .resizer-x { 
            position: absolute; top: 0; right: 0; width: 6px; height: 100%; 
            cursor: col-resize; z-index: 10; background: #444; transition: background 0.2s;
        }
        .resizer-y { 
            position: absolute; bottom: -3px; left: 0; width: 100%; height: 6px; 
            cursor: row-resize; z-index: 10; 
        }
        .resizer-x:hover, .resizer-x.resizing, 
        .resizer-y:hover, .resizer-y.resizing { background-color: #63b3ed; }

        /* 右側：ゲーム・マップ画面 */
        .canvas-container { 
            flex: 1; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            padding: 20px; overflow: hidden; min-width: 300px; 
        }
        .canvas-wrapper { max-width: 100%; max-height: 100%; display: flex; align-items: center; justify-content: center; }
        canvas { 
            background-color: #2d3748; 
            border: 3px solid #4a5568; 
            border-radius: 8px; 
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.7); 
            max-width: 100%; max-height: 100%; object-fit: contain; 
        }
        .controls-guide { 
            margin-top: 15px; font-size: 0.85rem; color: #a0aec0; 
            background-color: #2d3748; padding: 6px 15px; border-radius: 5px; text-align: center; 
        }

        /* ログ・ボタン関連 */
        .log-container { 
            background-color: #1a202c; border: 1px solid #4a5568; 
            border-radius: 6px; padding: 8px; height: 100%; min-height: 100px; 
            overflow-y: auto; font-family: monospace; font-size: 0.75rem; 
        }
        .log-item { margin-bottom: 4px; }
        .log-item.system { color: #a0aec0; }
        .log-item.info { color: #63b3ed; }
        .log-item.warn { color: #ecc94b; }
        .instruction-text { color: #a0aec0; font-size: 0.75rem; line-height: 1.4; }
    </style>
</head>
<body>

    <!-- ヘッダー -->
    <div class="game-header">
        <div class="header-title">Spatial File Organizer</div>
        <div class="header-badges">
            <div class="badge">Score: <span id="ui-score">0</span></div>
            <div class="badge badge-pending">Pending: <span id="ui-pending">0</span></div>
        </div>
    </div>

    <!-- メインレイアウト -->
    <div class="main-layout">
        <!-- ドックバー -->
        <div class="dock-bar">
            <div class="dock-btn active" title="File Viewer">📁</div>
            <div class="dock-btn" title="Skills">✨</div>
            <div class="dock-btn" title="System Logs">📜</div>
        </div>

        <!-- ワークスペース -->
        <div class="workspace">
            <!-- 左パネル（ウィンドウ群） -->
            <div class="side-panel" id="left-side-panel">
                <div class="windows-stack" id="windows-container">
                    
                    <!-- ファイルビュー -->
                    <div class="resizable-window" id="win-file-view">
                        <div class="window-header">
                            <span class="drag-handle">Files</span>
                            <button class="win-close-btn">×</button>
                        </div>
                        <div class="window-body">
                            <div class="instruction-text">Virtual File System Data...</div>
                        </div>
                        <div class="resizer-y"></div>
                    </div>

                    <!-- ログビュー -->
                    <div class="resizable-window" id="win-log-view">
                        <div class="window-header">
                            <span class="drag-handle">System Log</span>
                            <button class="win-close-btn">×</button>
                        </div>
                        <div class="window-body">
                            <div class="log-container" id="sys-log">
                                <div class="log-item system">System Initialized.</div>
                            </div>
                        </div>
                        <div class="resizer-y"></div>
                    </div>

                </div>
                <div class="resizer-x"></div>
            </div>

            <!-- 右側ゲームキャンバス -->
            <div class="canvas-container">
                <div class="canvas-wrapper">
                    <canvas id="game-canvas" width="800" height="600"></canvas>
                </div>
                <div class="controls-guide">
                    [WASD/Arrows]: Move | [Space]: Interact | [Shift]: Dash
                </div>
            </div>
        </div>
    </div>

    <!-- ===================================================================== -->
    <!-- JavaScript モジュール群の読み込み (依存関係順)                         -->
    <!-- ※各ファイルは /js/ ディレクトリに配置されている想定です                   -->
    <!-- ===================================================================== -->
    
    <!-- 1. 最重要基盤（他のすべてのシステムが依存） -->
    <script src="js/event_bus_system.js"></script>

    <!-- 2. コアロジック (Unit A関連) & データ管理 -->
    <script src="js/mockSystem.js"></script>
    <script src="js/transaction.js"></script>
    <script src="js/action.js"></script>
    <script src="js/virtualFileSystem.js"></script>

    <!-- 3. マップ・演出・空間管理 (Unit B関連) -->
    <script src="js/worldExplorer.js"></script>

    <!-- 4. UI・スキル・サポート (Unit C関連) -->
    <script src="js/unit_c.js"></script>

    <!-- 5. 各種マネージャー・ユーティリティ -->
    <script src="js/session.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/extension.js"></script>
    <script src="js/assetLoader.js"></script>
    <script src="js/json.js"></script>
    <script src="js/dataValidator.js"></script>
    <script src="js/sceneManager.js"></script>
    <script src="js/inputManager.js"></script>
    <script src="js/bgm.js"></script>
    <script src="js/rendererManager.js"></script>
    <script src="js/gameLifecycle.js"></script>

    <!-- 6. エンジンとアプリケーション本体 (すべてを統括) -->
    <script src="js/engine.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
